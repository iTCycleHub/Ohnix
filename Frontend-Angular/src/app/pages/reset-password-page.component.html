<app-auth-layout>
  <app-auth-card title="Reset password" subtitle="Request an OTP and set a new password.">

    @if (step === 0) {
      <form [formGroup]="emailForm" (ngSubmit)="sendOtp()" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="name@company.com" />
        </label>
        <button type="submit" [disabled]="loading">
          {{ loading ? 'Sending…' : 'Send OTP' }}
        </button>
      </form>
    }

    @if (step === 1) {
      <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="auth-form">
        <label>
          <span>OTP</span>
          <input type="text" formControlName="otp" placeholder="123456" />
        </label>
        <label>
          <span>New password</span>
          <input type="password" formControlName="newPassword" placeholder="••••••••" />
        </label>
        <label>
          <span>Confirm password</span>
          <input type="password" formControlName="confirmPassword" placeholder="••••••••" />
        </label>
        <button type="submit" [disabled]="loading">
          {{ loading ? 'Resetting…' : 'Reset password' }}
        </button>
      </form>
    }

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <a routerLink="/login" class="back-link">Back to login</a>
  </app-auth-card>
</app-auth-layout>
