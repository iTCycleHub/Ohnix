<app-auth-layout>
  <app-auth-card title="Create account" subtitle="Join the inventory workspace and start tracking operations.">

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label>
        <span>Username</span>
        <input type="text" formControlName="username" placeholder="jane.doe" />
      </label>

      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="name@company.com" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </label>

      <label>
        <span>Avatar</span>
        <input type="file" accept="image/*" (change)="onAvatarChange($event)" />
      </label>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Sign up' }}
      </button>
    </form>

    <a routerLink="/login" class="back-link">Already have an account? Login</a>
  </app-auth-card>
</app-auth-layout>
